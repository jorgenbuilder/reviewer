<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Proposal Reviewer Portal — "The Inspector" mascot. Monochrome zinc palette. -->
  <rect width="512" height="512" rx="112" fill="#09090b"/>

  <!-- Trench coat -->
  <path d="M152 474 L178 358 Q184 336 208 334 L304 334 Q328 336 334 358 L360 474 Z" fill="#a1a1aa"/>
  <!-- Neck -->
  <rect x="234" y="314" width="44" height="40" rx="10" fill="#e4e4e7"/>
  <!-- Popped collar / lapels -->
  <path d="M256 334 L208 334 Q214 367 236 381 L256 352 Z" fill="#52525b"/>
  <path d="M256 334 L304 334 Q298 367 276 381 L256 352 Z" fill="#52525b"/>
  <path d="M256 352 L256 452" stroke="#52525b" stroke-width="5" stroke-linecap="round"/>

  <!-- Face -->
  <rect x="190" y="192" width="132" height="140" rx="58" fill="#e4e4e7"/>
  <!-- Ear flaps -->
  <ellipse cx="176" cy="236" rx="20" ry="40" fill="#fafafa"/>
  <ellipse cx="336" cy="236" rx="20" ry="40" fill="#fafafa"/>

  <!-- Deerstalker brim + double bills -->
  <path d="M146 196 L121 189 L150 209 Z" fill="#a1a1aa"/>
  <path d="M366 196 L391 189 L362 209 Z" fill="#a1a1aa"/>
  <ellipse cx="256" cy="196" rx="110" ry="22" fill="#a1a1aa"/>
  <!-- Crown -->
  <path d="M186 198 C186 134 210 112 256 112 C302 112 326 134 326 198 Z" fill="#fafafa"/>
  <!-- Top knot / tied bow -->
  <path d="M256 108 L233 97 L233 119 Z" fill="#a1a1aa"/>
  <path d="M256 108 L279 97 L279 119 Z" fill="#a1a1aa"/>
  <circle cx="256" cy="108" r="7" fill="#71717a"/>

  <!-- Infinity-symbol eyes (open figure-eight so loops read clearly) -->
  <path d="M256 250 C252 226 208 226 204 250 C208 274 252 274 256 250 C260 226 304 226 308 250 C312 274 260 274 256 250 Z"
        fill="none" stroke="#18181b" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Nose -->
  <path d="M256 268 L256 282" stroke="#3f3f46" stroke-width="7" stroke-linecap="round"/>
  <!-- Mouth -->
  <path d="M240 298 Q256 310 272 298" stroke="#18181b" stroke-width="9" stroke-linecap="round" fill="none"/>
</svg>
